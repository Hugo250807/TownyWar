name: Build TownyConflict

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B --no-transfer-progress

      - name: Rename JAR
        run: |
          mkdir -p artifacts
          cp target/TownyConflict-*.jar artifacts/TownyConflict.jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TownyConflict
          path: artifacts/TownyConflict.jar
          retention-days: 30

      # Upload automatique sur les releases GitHub
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/TownyConflict.jar
